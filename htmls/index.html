<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arkive - 学习资源中心</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0f0f23;
  color: #e0e0e0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

.hero {
  text-align: center;
  margin-bottom: 60px;
  position: relative;
}
.hero::before {
  content: '';
  position: absolute;
  top: -100px; left: -200px; right: -200px; bottom: -100px;
  background:
    radial-gradient(ellipse at 30% 50%, rgba(118, 185, 0, 0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 50%, rgba(0, 212, 170, 0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 20%, rgba(102, 126, 234, 0.05) 0%, transparent 50%);
  pointer-events: none;
}
.hero h1 {
  font-size: 4em;
  background: linear-gradient(135deg, #76b900, #00d4aa, #667eea);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  position: relative;
  z-index: 1;
  margin-bottom: 12px;
}
.hero .subtitle {
  font-size: 1.2em;
  color: #888;
  position: relative;
  z-index: 1;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
  gap: 30px;
  max-width: 1000px;
  width: 100%;
}

.card {
  background: #1a1a2e;
  border-radius: 20px;
  border: 1px solid #333;
  padding: 40px;
  transition: all 0.3s ease;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  display: block;
  position: relative;
  overflow: hidden;
}
.card:hover {
  transform: translateY(-8px);
  border-color: var(--accent);
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 30px var(--glow);
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: var(--gradient);
}

.card-icon {
  font-size: 3em;
  margin-bottom: 16px;
}
.card h2 {
  font-size: 1.8em;
  color: #fff;
  margin-bottom: 12px;
}
.card p {
  color: #aaa;
  font-size: 1em;
  margin-bottom: 20px;
  line-height: 1.7;
}
.card-stats {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}
.card-stat {
  background: rgba(255,255,255,0.05);
  border: 1px solid #444;
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 0.8em;
  color: #aaa;
}

.card:nth-child(1) {
  --accent: #76b900;
  --glow: rgba(118, 185, 0, 0.15);
  --gradient: linear-gradient(90deg, #76b900, #00d4aa);
}
.card:nth-child(2) {
  --accent: #667eea;
  --glow: rgba(102, 126, 234, 0.15);
  --gradient: linear-gradient(90deg, #667eea, #764ba2);
}

.footer {
  margin-top: 60px;
  text-align: center;
  color: #555;
  font-size: 0.85em;
}
.footer a {
  color: #76b900;
  text-decoration: none;
}

@media (max-width: 768px) {
  .hero h1 { font-size: 2.5em; }
  .cards { grid-template-columns: 1fr; }
  .card { padding: 30px; }
}

.fade-in {
  opacity: 0;
  transform: translateY(30px);
  animation: fadeUp 0.6s ease forwards;
}
.fade-in:nth-child(2) { animation-delay: 0.15s; }
@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="hero">
  <h1>Arkive</h1>
  <p class="subtitle">交互式学习资源中心 — 动画 + 练习 + 进度追踪</p>
</div>

<div class="cards">
  <a class="card fade-in" href="algorithms/algorithms-index.html">
    <div class="card-icon">⚡</div>
    <h2>算法模板速查</h2>
    <p>22 个核心算法模板，从二分查找到动态规划。每个配有交互动画、通俗解释、思考题和 LeetCode 练习。支持 localStorage 进度追踪。</p>
    <div class="card-stats">
      <span class="card-stat">22 模板</span>
      <span class="card-stat">30+ 动画</span>
      <span class="card-stat">150+ 练习</span>
      <span class="card-stat">进度追踪</span>
    </div>
  </a>

  <a class="card fade-in" href="ml-systems-index.html">
    <div class="card-icon">🧠</div>
    <h2>ML Systems Tutorial</h2>
    <p>从 Transformer 原理到 RLHF 生产系统，循序渐进的机器学习系统工程完全指南。涵盖 GPU、分布式训练、推理优化等核心主题。</p>
    <div class="card-stats">
      <span class="card-stat">7 章节</span>
      <span class="card-stat">30+ 动画</span>
      <span class="card-stat">25+ 练习</span>
      <span class="card-stat">60+ 面试题</span>
    </div>
  </a>
</div>

<div class="footer">
  <p>Built with <a href="https://github.com/dreamyang-liu/TC">Arkive</a></p>
</div>

</body>
</html>
